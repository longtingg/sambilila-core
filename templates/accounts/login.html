<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Sambilila Core</title>
    <style>
        body { background: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 48px; border-radius: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); width: 100%; max-width: 320px; }
        h1 { font-size: 20px; margin-bottom: 32px; color: #1d1d1f; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0071e3; color: #fff; border: none; border-radius: 12px; font-weight: 500; cursor: pointer; }
        button:hover { background: #0077ed; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sign in to portal</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="User ID" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Continue</button>
        </form>
    </div>
</body>
</html>
